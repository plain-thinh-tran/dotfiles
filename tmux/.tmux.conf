# Enable mouse support (tmux 2.1+)
set -g mouse on

# Increase history limit
set -g history-limit 50000

# Start windows and panes at 1, not 0 (makes it easier to switch)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Automatically rename window to current directory
setw -g automatic-rename on

# Increase repeat time for repeatable commands
set -g repeat-time 300

# Focus events enabled for terminals that support them
set -g focus-events on

# Aggressive resize - resize the window to the size of the smallest client
setw -g aggressive-resize on

# Enable vi mode keys
setw -g mode-keys vi

# Better pane splitting - split current path instead of starting in home
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Status bar customization
set -g status-position bottom
set -g status-style 'bg=#1e1e1e fg=#ffffff'
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[fg=green]#S #[fg=white]│ '
set -g status-right '#[fg=cyan]%Y-%m-%d %H:%M #[fg=white]│ #[fg=yellow]#{?client_prefix,#[fg=red]PREFIX,#[fg=green]NORMAL} '

# Window status
setw -g window-status-style 'fg=#666666 bg=default'
setw -g window-status-current-style 'fg=#ffffff bg=#1e1e1e bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Pane border
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#00ff00'

# Message style
set -g message-style 'fg=#ffffff bg=#1e1e1e'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'          # Save/restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'        # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-open'              # Open files/URLs from tmux
set -g @plugin 'tmux-plugins/tmux-copycat'           # Enhanced search
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'   # Highlight when prefix is pressed
set -g @plugin 'tmux-plugins/tmux-battery'           # Battery status in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'                # CPU usage in status bar
set -g @plugin 'tmux-plugins/tmux-net-speed'          # Network speed in status bar

# Plugin configurations
# Resurrect - save/restore sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'

# Continuum - auto-save every 15 minutes
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Copycat - search patterns
set -g @copycat_git_support 'on'
set -g @copycat_ssh_support 'on'

# Prefix highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
